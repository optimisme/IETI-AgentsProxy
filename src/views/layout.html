<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    body { margin: 0; background: #f5f7fb; color: #172033; }
    header { background: #172033; color: white; padding: 14px 24px; display: flex; gap: 18px; align-items: center; }
    header strong { margin-right: 36px; }
    header a, header button { color: white; background: transparent; border: 0; font: inherit; cursor: pointer; text-decoration: none; }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #d9deea; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5e9f2; text-align: left; vertical-align: top; }
    th { background: #eef2f8; font-size: 13px; }
    input, textarea, select { width: 100%; box-sizing: border-box; padding: 9px; border: 1px solid #bac3d4; border-radius: 6px; font: inherit; }
    label { display: block; font-size: 13px; font-weight: 650; margin: 12px 0 5px; }
    button, .button { display: inline-block; padding: 8px 12px; border: 1px solid #172033; border-radius: 6px; background: #172033; color: white; text-decoration: none; font: inherit; cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .secondary { background: white; color: #172033; }
    .password-field { display: flex; gap: 8px; align-items: stretch; }
    .password-field input { flex: 1; min-width: 0; }
    .password-field button { width: 76px; flex: 0 0 auto; }
    .check-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 2px 14px; margin-bottom: 10px; }
    .check-list label { font-weight: 500; margin: 4px 0; }
    .danger { background: #9f1f2f; border-color: #9f1f2f; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
    .metric, .panel { background: white; border: 1px solid #d9deea; border-radius: 8px; padding: 16px; }
    .metric strong { display: block; font-size: 28px; margin-top: 4px; }
    .quota-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
    .quota { background: white; border: 1px solid #d9deea; border-radius: 8px; padding: 12px; }
    .quota-row { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
    .quota-row span { color: #344054; font-size: 13px; white-space: nowrap; }
    .progress { height: 10px; background: #e8edf5; border-radius: 999px; overflow: hidden; margin: 10px 0 6px; }
    .progress span { display: block; height: 100%; background: #2f6fed; border-radius: inherit; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .actions form { display: inline; }
    .section-stack { display: grid; gap: 24px; }
    .server-sections { display: grid; gap: 16px; }
    .provider-sections { display: grid; gap: 16px; }
    .form-actions { display: flex; justify-content: space-between; gap: 16px; align-items: center; margin-top: 16px; }
    .search-panel { margin-bottom: 18px; }
    .status-enabled { color: #087443; font-weight: 700; }
    .status-disabled { color: #b42318; font-weight: 700; }
    .pagination { display: flex; gap: 8px; align-items: center; justify-content: flex-end; margin-top: 12px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgb(23 32 51 / 48%); display: grid; place-items: center; padding: 24px; z-index: 10; }
    .modal { width: min(520px, 100%); background: white; border-radius: 8px; border: 1px solid #d9deea; box-shadow: 0 18px 44px rgb(23 32 51 / 22%); padding: 20px; }
    .modal h2 { margin-top: 0; }
    .modal .actions { justify-content: flex-end; margin-top: 16px; }
    .notice { background: #fff8df; border: 1px solid #e3c96a; border-radius: 8px; padding: 12px; margin-bottom: 18px; }
    .error { background: #fff0f2; border: 1px solid #d94b5c; border-radius: 8px; padding: 12px; margin-bottom: 18px; }
    .key { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; background: #eef2f8; padding: 10px; border-radius: 6px; }
    .muted { color: #667085; }
  </style>
</head>
<body>
  {{nav}}
  <main>{{content}}</main>
</body>
</html>
